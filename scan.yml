name: Portfolio Scan

on:
  schedule:
    - cron: "*/10 * * * *"

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Run script
        run: node scan.js
        env:
          API_KEY: ${{ secrets.API_KEY }}

      - name: Commit data
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@github.com"
          git add data.json
          git commit -m "update"
          git push