<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Markets" />
  <meta name="theme-color" content="#0a0a0f" />
  <title>Markets</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.svg" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0f; --surface: #111118; --border: rgba(255,255,255,0.07);
      --up: #00e8a2; --down: #ff4d6d; --neutral: #888;
      --text: #f0eeff; --muted: #666; --accent: #c8b8ff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; min-height: 100dvh; overflow-x: hidden; padding-bottom: env(safe-area-inset-bottom); }
    body::before { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events: none; z-index: 999; opacity: 0.6; }
    header { padding: 56px 20px 16px; padding-top: calc(56px + env(safe-area-inset-top)); display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 1px solid var(--border); }
    .logo { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; letter-spacing: -0.5px; color: var(--text); }
    .logo span { color: var(--accent); }
    .time-display { font-size: 11px; color: var(--muted); letter-spacing: 0.5px; }
    .search-bar { margin: 16px; display: flex; gap: 8px; align-items: center; }
    .search-input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 14px; outline: none; transition: border-color 0.2s; text-transform: uppercase; }
    .search-input::placeholder { color: var(--muted); text-transform: none; }
    .search-input:focus { border-color: var(--accent); }
    .search-btn { background: var(--accent); border: none; border-radius: 12px; padding: 12px 18px; color: #0a0a0f; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 13px; cursor: pointer; transition: opacity 0.2s, transform 0.1s; }
    .search-btn:active { transform: scale(0.96); opacity: 0.85; }
    .section-label { font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; padding: 8px 20px 8px; }
    .stock-card { display: flex; align-items: center; padding: 14px 20px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.15s; animation: slideIn 0.3s ease-out both; position: relative; overflow: hidden; }
    .stock-card:active { background: rgba(255,255,255,0.03); }
    @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
    .stock-left { flex: 1; }
    .stock-ticker { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; letter-spacing: 0.5px; color: var(--text); }
    .stock-name { font-size: 11px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 160px; }
    .stock-chart { width: 70px; height: 36px; margin: 0 16px; }
    .stock-right { text-align: right; min-width: 80px; }
    .stock-price { font-size: 16px; font-weight: 500; letter-spacing: -0.5px; }
    .stock-change { font-size: 12px; margin-top: 2px; display: flex; align-items: center; justify-content: flex-end; gap: 3px; }
    .up { color: var(--up); } .down { color: var(--down); } .neutral { color: var(--neutral); }
    .change-badge { padding: 2px 7px; border-radius: 6px; font-size: 11px; font-weight: 500; }
    .up-badge { background: rgba(0,232,162,0.12); color: var(--up); }
    .down-badge { background: rgba(255,77,109,0.12); color: var(--down); }
    .skeleton { background: linear-gradient(90deg, var(--surface) 25%, rgba(255,255,255,0.04) 50%, var(--surface) 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 6px; }
    @keyframes shimmer { 0% { background-position: 200% center; } 100% { background-position: -200% center; } }
    .detail-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); z-index: 100; display: none; align-items: flex-end; }
    .detail-overlay.open { display: flex; }
    .detail-panel { background: #13131c; border-radius: 24px 24px 0 0; width: 100%; padding: 20px 24px 40px; padding-bottom: calc(40px + env(safe-area-inset-bottom)); border-top: 1px solid rgba(255,255,255,0.1); animation: slideUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .detail-handle { width: 40px; height: 4px; background: rgba(255,255,255,0.15); border-radius: 2px; margin: 0 auto 20px; }
    .detail-ticker { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; }
    .detail-name { font-size: 13px; color: var(--muted); margin-top: 4px; }
    .detail-price-row { display: flex; align-items: baseline; gap: 12px; margin: 20px 0 8px; }
    .detail-price { font-size: 36px; font-weight: 300; letter-spacing: -1px; }
    .detail-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
    .stat-box { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px; }
    .stat-label { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
    .stat-value { font-size: 16px; font-weight: 500; }
    .close-btn { width: 100%; margin-top: 20px; padding: 16px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 14px; color: var(--text); font-family: 'Syne', sans-serif; font-weight: 600; font-size: 14px; cursor: pointer; }
    .remove-btn { background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; padding: 4px 8px; margin-left: 4px; }
    .market-status { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); padding: 8px 20px 4px; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--up); animation: pulse 2s infinite; }
    .status-dot.closed { background: var(--down); animation: none; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .error-msg { font-size: 12px; color: var(--down); padding: 8px 20px; }
    .empty-state { text-align: center; padding: 48px 24px; color: var(--muted); font-size: 13px; line-height: 1.8; }
    .empty-icon { font-size: 40px; margin-bottom: 12px; }
  </style>
</head>
<body>
<header>
  <div class="logo">MKT<span>●</span></div>
  <div class="time-display" id="timeDisplay">--:--</div>
</header>
<div class="search-bar">
  <input class="search-input" id="searchInput" placeholder="Add ticker (e.g. AAPL)" maxlength="10" />
  <button class="search-btn" onclick="addTicker()">ADD</button>
</div>
<div class="market-status">
  <div class="status-dot" id="statusDot"></div>
  <span id="statusText">Checking market...</span>
</div>
<div id="errorMsg" class="error-msg" style="display:none"></div>
<div class="section-label">WATCHLIST</div>
<div id="stockList"></div>
<div class="detail-overlay" id="detailOverlay" onclick="closeDetail(event)">
  <div class="detail-panel" id="detailPanel">
    <div class="detail-handle"></div>
    <div id="detailContent"></div>
    <button class="close-btn" onclick="closeDetailBtn()">Close</button>
  </div>
</div>
<script>
  const DEFAULT_TICKERS = ['AAPL','TSLA','NVDA','SPY','BTC-USD'];
  let watchlist = JSON.parse(localStorage.getItem('watchlist') || JSON.stringify(DEFAULT_TICKERS));
  let stockData = {};
  function updateTime() { document.getElementById('timeDisplay').textContent = new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}); }
  updateTime(); setInterval(updateTime, 10000);
  function updateMarketStatus() {
    const day = new Date().getDay();
    const dot = document.getElementById('statusDot'), txt = document.getElementById('statusText');
    if (day===0||day===6) { dot.className='status-dot closed'; txt.textContent='Markets closed · Weekend'; }
    else { dot.className='status-dot'; txt.textContent='US Markets · Weekday'; }
  }
  updateMarketStatus();
  async function fetchQuote(ticker) {
    try {
      const res = await fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1d&range=5d`);
      const data = await res.json();
      const result = data?.chart?.result?.[0]; if (!result) return null;
      const meta = result.meta;
      const closes = result.indicators?.quote?.[0]?.close?.filter(v=>v!=null)||[];
      return { ticker, name: meta.longName||meta.shortName||ticker, price: meta.regularMarketPrice, prevClose: meta.chartPreviousClose||meta.previousClose, open: meta.regularMarketOpen, high: meta.regularMarketDayHigh, low: meta.regularMarketDayLow, volume: meta.regularMarketVolume, sparkline: closes.slice(-5), currency: meta.currency||'USD' };
    } catch(e) { return null; }
  }
  function fmt(n,d=2) { if(n==null||isNaN(n))return'—'; return n.toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d}); }
  function fmtVol(n) { if(!n)return'—'; if(n>=1e9)return(n/1e9).toFixed(2)+'B'; if(n>=1e6)return(n/1e6).toFixed(2)+'M'; if(n>=1e3)return(n/1e3).toFixed(1)+'K'; return n.toString(); }
  function sparklineSVG(data,isUp) {
    if(!data||data.length<2)return'';
    const w=70,h=36,pad=2,min=Math.min(...data),max=Math.max(...data),range=max-min||1;
    const pts=data.map((v,i)=>`${pad+(i/(data.length-1))*(w-pad*2)},${h-pad-((v-min)/range)*(h-pad*2)}`);
    const color=isUp?'#00e8a2':'#ff4d6d';
    return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}"><defs><linearGradient id="g${isUp?'u':'d'}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${color}" stop-opacity="0.3"/><stop offset="100%" stop-color="${color}" stop-opacity="0"/></linearGradient></defs><path d="M${pts[0]} L${pts.join(' L')} L${w-pad},${h} L${pad},${h} Z" fill="url(#g${isUp?'u':'d'})"/><path d="M${pts.join(' L')}" stroke="${color}" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  }
  function renderList() {
    const c=document.getElementById('stockList');
    if(!watchlist.length){c.innerHTML='<div class="empty-state"><div class="empty-icon">📈</div>Your watchlist is empty.<br>Add a ticker above.</div>';return;}
    c.innerHTML=watchlist.map((ticker,idx)=>{
      const d=stockData[ticker];
      if(!d)return`<div class="stock-card" style="animation-delay:${idx*0.05}s"><div class="stock-left"><div class="stock-ticker">${ticker}</div><div class="skeleton" style="width:100px;height:11px;margin-top:6px"></div></div><div class="skeleton" style="width:70px;height:36px;margin:0 16px;border-radius:8px"></div><div class="stock-right"><div class="skeleton" style="width:60px;height:16px;margin-left:auto"></div><div class="skeleton" style="width:50px;height:12px;margin-top:6px;margin-left:auto"></div></div><button class="remove-btn" onclick="removeTicker('${ticker}',event)">×</button></div>`;
      const change=d.price-d.prevClose,pct=(change/d.prevClose)*100,isUp=change>=0;
      return`<div class="stock-card" style="animation-delay:${idx*0.05}s" onclick="openDetail('${ticker}')"><div class="stock-left"><div class="stock-ticker">${ticker}</div><div class="stock-name">${d.name}</div></div><div class="stock-chart">${sparklineSVG(d.sparkline,isUp)}</div><div class="stock-right"><div class="stock-price">${fmt(d.price)}</div><div class="stock-change"><span class="change-badge ${isUp?'up-badge':'down-badge'}">${isUp?'▲':'▼'} ${Math.abs(pct).toFixed(2)}%</span></div></div><button class="remove-btn" onclick="removeTicker('${ticker}',event)">×</button></div>`;
    }).join('');
  }
  async function loadAll() { renderList(); await Promise.all(watchlist.map(async t=>{const d=await fetchQuote(t);if(d)stockData[t]=d;renderList();})); }
  async function addTicker() {
    const input=document.getElementById('searchInput'),ticker=input.value.trim().toUpperCase();
    if(!ticker)return; if(watchlist.includes(ticker)){showError(ticker+' already in watchlist');return;}
    input.value=''; hideError(); watchlist.push(ticker); saveWatchlist(); renderList();
    const data=await fetchQuote(ticker);
    if(data){stockData[ticker]=data;}else{showError('Could not find "'+ticker+'". Check ticker.');watchlist=watchlist.filter(t=>t!==ticker);saveWatchlist();}
    renderList();
  }
  function removeTicker(ticker,e){e.stopPropagation();watchlist=watchlist.filter(t=>t!==ticker);delete stockData[ticker];saveWatchlist();renderList();}
  function saveWatchlist(){localStorage.setItem('watchlist',JSON.stringify(watchlist));}
  function showError(msg){const el=document.getElementById('errorMsg');el.textContent=msg;el.style.display='block';setTimeout(hideError,4000);}
  function hideError(){document.getElementById('errorMsg').style.display='none';}
  function openDetail(ticker) {
    const d=stockData[ticker]; if(!d)return;
    const change=d.price-d.prevClose,pct=(change/d.prevClose)*100,isUp=change>=0,cls=isUp?'up':'down',arrow=isUp?'▲':'▼';
    document.getElementById('detailContent').innerHTML=`<div class="detail-ticker ${cls}">${ticker}</div><div class="detail-name">${d.name} · ${d.currency}</div><div class="detail-price-row"><div class="detail-price">${fmt(d.price)}</div><div class="${cls}" style="font-size:14px">${arrow} ${fmt(Math.abs(change))} (${Math.abs(pct).toFixed(2)}%)</div></div><div class="detail-stats"><div class="stat-box"><div class="stat-label">Open</div><div class="stat-value">${fmt(d.open)}</div></div><div class="stat-box"><div class="stat-label">Prev Close</div><div class="stat-value">${fmt(d.prevClose)}</div></div><div class="stat-box"><div class="stat-label">Day High</div><div class="stat-value up">${fmt(d.high)}</div></div><div class="stat-box"><div class="stat-label">Day Low</div><div class="stat-value down">${fmt(d.low)}</div></div><div class="stat-box" style="grid-column:span 2"><div class="stat-label">Volume</div><div class="stat-value">${fmtVol(d.volume)}</div></div></div>`;
    document.getElementById('detailOverlay').classList.add('open');
  }
  function closeDetail(e){if(e.target===document.getElementById('detailOverlay'))closeDetailBtn();}
  function closeDetailBtn(){document.getElementById('detailOverlay').classList.remove('open');}
  document.getElementById('searchInput').addEventListener('keydown',e=>{if(e.key==='Enter')addTicker();});
  loadAll(); setInterval(loadAll,60000);
  if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
</body>
</html>
