<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analizator Portfela Trading 212</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .input-group { margin-bottom: 20px; }
        input { padding: 10px; width: 70%; border: 1px solid #ddd; border-radius: 5px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .stats { display: flex; gap: 20px; margin-top: 20px; }
        .card { flex: 1; padding: 15px; border-radius: 8px; color: white; text-align: center; }
        .total { background: #28a745; }
        .pnl { background: #17a2b8; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border-bottom: 1px solid #eee; padding: 12px; text-align: left; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Mój Portfel Trading 212</h2>
        <div class="input-group">
            <input type="password" id="apiKey" placeholder="Wklej swój Klucz API (v0)">
            <button onclick="fetchPortfolio()">Analizuj</button>
        </div>

        <div class="stats">
            <div class="card total">
                <h3>Wartość Portfela</h3>
                <p id="totalValue">0.00 PLN</p>
            </div>
            <div class="card pnl">
                <h3>Zysk/Strata</h3>
                <p id="totalPnl">0.00 PLN</p>
            </div>
        </div>

        <canvas id="portfolioChart" style="margin-top:30px; max-height: 300px;"></canvas>

        <table id="holdingsTable">
            <thead>
                <tr>
                    <th>Ticker</th>
                    <th>Ilość</th>
                    <th>Cena zakupu</th>
                    <th>Zysk/Strata</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script src="app.js"></script>
</body>
</html>
